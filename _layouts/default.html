<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include nav.html %}

  {% if page.hero %}
  <section class="hero">
    <h1>{{ page.hero_title | default: page.title }}</h1>
    <p>{{ page.hero_subtitle }}</p>
  </section>
  {% endif %}

  <main class="page-wrapper">
    {% unless page.hero %}
    <h1 class="page-title">{{ page.title }}</h1>
    {% endunless %}
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Mobile dropdown toggle – expand button toggles submenu,
    // nav links always navigate normally
    document.querySelectorAll('.nav-expand').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        var item = this.parentElement;
        var wasOpen = item.classList.contains('open');
        // Close all open items
        document.querySelectorAll('.nav-item.open').forEach(function(i) { i.classList.remove('open'); });
        if (!wasOpen) item.classList.add('open');
      });
    });
  </script>
  <script data-goatcounter="https://fraschlab.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
